services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${API_URL}
      APP_KEY: ${APP_KEY}
      APP_SEED_ON_BOOT: ${APP_SEED_ON_BOOT:-false}
      LOG_CHANNEL: stack
      LOG_LEVEL: info
      PORT: 9000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: nest
      DB_USERNAME: nest
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CACHE_STORE: database
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
      QUEUE_CONNECTION: database
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      AI_SURFACE_ENABLED: ${AI_SURFACE_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:9000/health') === false ? 1 : 0);\""]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${API_URL}
      APP_KEY: ${APP_KEY}
      RUN_QUEUE_WORKER: "true"
      QUEUE_WORKER_TIMEOUT: 90
      LOG_CHANNEL: stack
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: nest
      DB_USERNAME: nest
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      AI_SURFACE_ENABLED: ${AI_SURFACE_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_NEST_API_URL: ${NEXT_PUBLIC_NEST_API_URL}
      NEXT_PUBLIC_NEST_DEFAULT_LANGUAGE: ${NEXT_PUBLIC_NEST_DEFAULT_LANGUAGE:-en}
      NEXT_PUBLIC_NEST_OFFLINE_CACHE_RETENTION_DAYS: ${NEXT_PUBLIC_NEST_OFFLINE_CACHE_RETENTION_DAYS:-30}
      NEXT_PUBLIC_NEST_OFFLINE_CACHE_SECRET: ${NEXT_PUBLIC_NEST_OFFLINE_CACHE_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nest
      POSTGRES_USER: nest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - nest_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nest -d nest"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  nest_postgres_data:
