openapi: 3.1.0
info:
  title: Nest Automation Rules API v1 (Draft)
  version: 0.1.0
  description: >
    Draft contract for automation rule model covering trigger, condition, and
    action definitions.
  license:
    name: Proprietary
    url: https://nest.local/license
servers:
  - url: https://api.nest.local/api/v1
security:
  - bearerAuth: []
paths:
  /automations/rules:
    get:
      summary: List automation rules
      operationId: getAutomationsRules
      tags: [Automations]
      responses:
        '200':
          description: Rule collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRuleCollectionResponse'
        '401':
          description: Authentication required
    post:
      summary: Create automation rule
      operationId: postAutomationsRules
      tags: [Automations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationRuleCreateRequest'
      responses:
        '201':
          description: Created rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRuleSingleResponse'
        '401':
          description: Authentication required
  /automations/rules/{ruleId}:
    get:
      summary: Get automation rule details
      operationId: getAutomationsRulesRuleId
      tags: [Automations]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '200':
          description: Rule details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRuleSingleResponse'
        '404':
          description: Not found
    patch:
      summary: Update automation rule
      operationId: patchAutomationsRulesRuleId
      tags: [Automations]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationRuleUpdateRequest'
      responses:
        '200':
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRuleSingleResponse'
        '401':
          description: Authentication required
    delete:
      summary: Delete automation rule
      operationId: deleteAutomationsRulesRuleId
      tags: [Automations]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '204':
          description: Deleted
        '401':
          description: Authentication required
  /automations/rules/{ruleId}/execute:
    post:
      summary: Execute automation rule manually
      operationId: postAutomationsRulesRuleIdExecute
      tags: [Automations]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                trigger_payload:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Execution run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRunSingleResponse'
        '401':
          description: Authentication required
  /automations/runs:
    get:
      summary: List automation execution runs
      operationId: getAutomationsRuns
      tags: [Automations]
      responses:
        '200':
          description: Run collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRunCollectionResponse'
        '401':
          description: Authentication required
  /automations/runs/{runId}:
    get:
      summary: Get automation run details
      operationId: getAutomationsRunsRunId
      tags: [Automations]
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRunSingleResponse'
        '401':
          description: Authentication required
  /automations/runs/{runId}/replay:
    post:
      summary: Replay automation run using original trigger payload
      operationId: postAutomationsRunsRunIdReplay
      tags: [Automations]
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: New replay run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationRunSingleResponse'
        '401':
          description: Authentication required
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SanctumToken

  parameters:
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    AutomationRule:
      type: object
      required:
        - id
        - name
        - status
        - trigger
        - conditions
        - actions
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 120
        status:
          type: string
          enum: [active, paused]
        trigger:
          $ref: '#/components/schemas/AutomationTrigger'
        conditions:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/AutomationCondition'
        actions:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/AutomationAction'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AutomationTrigger:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [event, schedule, metric_threshold]
        event_name:
          type: string
        schedule:
          type: string
        metric_name:
          type: string
        threshold:
          type: number
        debounce_seconds:
          type: integer
          minimum: 0
    AutomationCondition:
      type: object
      required: [field, operator, value]
      properties:
        field:
          type: string
        operator:
          type: string
          enum: [equals, not_equals, contains, greater_than, less_than, in]
        value: {}
    AutomationAction:
      type: object
      required: [type, payload]
      properties:
        type:
          type: string
          enum:
            - create_task
            - update_task
            - schedule_event
            - log_habit
            - create_journal_entry
            - send_notification
        payload:
          type: object
          additionalProperties: true
    AutomationRuleCreateRequest:
      type: object
      required: [name, trigger, conditions, actions]
      properties:
        name:
          type: string
          maxLength: 120
        status:
          type: string
          enum: [active, paused]
        trigger:
          $ref: '#/components/schemas/AutomationTrigger'
        conditions:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/AutomationCondition'
        actions:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/AutomationAction'
    AutomationRuleUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        status:
          type: string
          enum: [active, paused]
        trigger:
          $ref: '#/components/schemas/AutomationTrigger'
        conditions:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/AutomationCondition'
        actions:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/AutomationAction'
    AutomationRuleSingleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AutomationRule'
    AutomationRuleCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AutomationRule'
        meta:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
    AutomationRun:
      type: object
      required:
        - id
        - rule_id
        - status
        - started_at
      properties:
        id:
          type: string
          format: uuid
        rule_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [success, failed, skipped]
        started_at:
          type: string
          format: date-time
        finished_at:
          type: [string, 'null']
          format: date-time
        error_code:
          type: [string, 'null']
    AutomationRunCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AutomationRun'
        meta:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
    AutomationRunSingleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AutomationRun'
