openapi: 3.1.0
info:
  title: Nest API - Auth, Integrations and Platform Contract
  version: 1.0.0-draft
  summary: Public API contract for auth, integrations, and cross-module platform endpoints.
  description: >
    OpenAPI draft introduced in NEST-091 to ensure all active public route groups
    are represented by maintained contracts.
  license:
    name: Proprietary
    url: https://nest.local/license
servers:
  - url: /api
    description: Relative API base path
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Billing
  - name: Analytics
  - name: AI
  - name: Insights
  - name: Organizations
  - name: Collaboration
  - name: Integrations
  - name: Notifications
paths:
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register account
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Login account
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current token
      operationId: authLogout
      responses:
        '204':
          description: Logged out

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: authMe
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/auth/settings:
    patch:
      tags: [Auth]
      summary: Update current user settings
      operationId: authSettingsUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated profile/settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/oauth/{provider}/exchange:
    post:
      tags: [Auth]
      summary: Exchange OAuth identity for local auth token
      operationId: oauthExchange
      security: []
      parameters:
        - $ref: '#/components/parameters/Provider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Authenticated via OAuth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/orgs/{organizationSlug}/sso/{providerSlug}/exchange:
    post:
      tags: [Auth, Organizations]
      summary: Exchange SSO assertion/token for local auth token
      operationId: organizationSsoExchange
      security: []
      parameters:
        - $ref: '#/components/parameters/OrganizationSlug'
        - $ref: '#/components/parameters/ProviderSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Authenticated via organization SSO
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/billing/providers/stripe/webhook:
    post:
      tags: [Billing]
      summary: Stripe webhook receiver
      operationId: stripeWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /v1/analytics/events:
    post:
      tags: [Analytics]
      summary: Ingest analytics events batch
      operationId: ingestAnalyticsEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    additionalProperties: true
      responses:
        '202':
          description: Batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/ai/weekly-plan/propose:
    post:
      tags: [AI]
      summary: Propose AI weekly plan
      operationId: proposeWeeklyPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Weekly plan response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/ai/context-graph:
    get:
      tags: [AI]
      summary: Build deterministic AI context graph for retrieval
      operationId: getAiContextGraph
      parameters:
        - in: query
          name: window_days
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 60
        - in: query
          name: entity_limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - in: query
          name: as_of
          required: false
          description: Optional fixed snapshot anchor for deterministic replay.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Context graph payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiContextGraphResponse'

  /v1/ai/copilot/conversation:
    post:
      tags: [AI]
      summary: Ask conversational copilot with retrieval context
      operationId: askAiCopilotConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiCopilotConversationRequest'
      responses:
        '200':
          description: Copilot response payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiCopilotConversationResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/ai/actions/proposals:
    get:
      tags: [AI]
      summary: List AI write-action proposals
      operationId: listAiActionProposals
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected, executed, failed]
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Proposal collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiActionProposalCollectionResponse'
    post:
      tags: [AI]
      summary: Propose AI write action requiring approval
      operationId: proposeAiAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiActionProposalRequest'
      responses:
        '201':
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiActionProposalResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/ai/actions/proposals/{proposalId}/approve:
    post:
      tags: [AI]
      summary: Approve and execute pending AI proposal
      operationId: approveAiActionProposal
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      responses:
        '200':
          description: Proposal approved and executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiActionProposalResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/ai/actions/proposals/{proposalId}/reject:
    post:
      tags: [AI]
      summary: Reject pending AI proposal
      operationId: rejectAiActionProposal
      parameters:
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
                  maxLength: 1000
      responses:
        '200':
          description: Proposal rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiActionProposalResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/ai/briefings/preferences:
    get:
      tags: [AI]
      summary: Get AI briefing preferences
      operationId: getAiBriefingPreferences
      responses:
        '200':
          description: Briefing preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBriefingPreferenceResponse'
    patch:
      tags: [AI]
      summary: Update AI briefing preferences
      operationId: updateAiBriefingPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiBriefingPreferenceUpdateRequest'
      responses:
        '200':
          description: Updated briefing preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBriefingPreferenceResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/ai/briefings:
    get:
      tags: [AI]
      summary: List generated AI briefings
      operationId: listAiBriefings
      parameters:
        - in: query
          name: cadence
          required: false
          schema:
            type: string
            enum: [daily, weekly]
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Briefing collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBriefingCollectionResponse'

  /v1/ai/briefings/generate:
    post:
      tags: [AI]
      summary: Generate daily or weekly AI briefing
      operationId: generateAiBriefing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiBriefingGenerateRequest'
      responses:
        '201':
          description: Briefing generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBriefingResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/ai/briefings/{briefingId}:
    get:
      tags: [AI]
      summary: Get one generated AI briefing
      operationId: getAiBriefing
      parameters:
        - $ref: '#/components/parameters/BriefingId'
      responses:
        '200':
          description: Briefing payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiBriefingResponse'

  /v1/ai/feedback:
    post:
      tags: [AI]
      summary: Submit AI recommendation feedback
      operationId: submitAiFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Feedback accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/insights/life-area-balance:
    get:
      tags: [Insights]
      summary: Get life area balance summary
      operationId: getLifeAreaBalance
      parameters:
        - in: query
          name: window_days
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Balance summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/insights/trends/tasks:
    get:
      tags: [Insights]
      summary: Get tasks trend
      operationId: getTasksTrend
      responses:
        '200':
          description: Trend payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/insights/trends/habits:
    get:
      tags: [Insights]
      summary: Get habits trend
      operationId: getHabitsTrend
      responses:
        '200':
          description: Trend payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/insights/trends/goals:
    get:
      tags: [Insights]
      summary: Get goals trend
      operationId: getGoalsTrend
      responses:
        '200':
          description: Trend payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/orgs:
    get:
      tags: [Organizations]
      summary: List organizations
      operationId: listOrganizations
      responses:
        '200':
          description: Organization collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollectionResponse'
    post:
      tags: [Organizations]
      summary: Create organization
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/orgs/{organizationId}/members:
    post:
      tags: [Organizations]
      summary: Add organization member
      operationId: addOrganizationMember
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/orgs/{organizationId}/members/{memberUserId}:
    patch:
      tags: [Organizations]
      summary: Update organization member role
      operationId: updateOrganizationMemberRole
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/MemberUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Member updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/orgs/{organizationId}/sso/providers:
    get:
      tags: [Organizations]
      summary: List organization SSO providers
      operationId: listOrganizationSsoProviders
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: SSO provider collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollectionResponse'
    post:
      tags: [Organizations]
      summary: Create organization SSO provider
      operationId: createOrganizationSsoProvider
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: SSO provider created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/orgs/{organizationId}/sso/providers/{providerId}:
    patch:
      tags: [Organizations]
      summary: Update organization SSO provider
      operationId: updateOrganizationSsoProvider
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/ProviderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: SSO provider updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/orgs/{organizationId}/audit-exports:
    get:
      tags: [Organizations]
      summary: Export organization audit package
      operationId: exportOrganizationAudit
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv]
      responses:
        '200':
          description: Audit export payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
            text/csv:
              schema:
                type: string

  /v1/workspaces:
    get:
      tags: [Organizations]
      summary: List workspaces
      operationId: listWorkspaces
      responses:
        '200':
          description: Workspace collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollectionResponse'
    post:
      tags: [Organizations]
      summary: Create workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/collaboration/spaces:
    get:
      tags: [Collaboration]
      summary: List collaboration spaces
      operationId: listCollaborationSpaces
      responses:
        '200':
          description: Space collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollectionResponse'
    post:
      tags: [Collaboration]
      summary: Create collaboration space
      operationId: createCollaborationSpace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Space created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/collaboration/spaces/{spaceId}/invites:
    post:
      tags: [Collaboration]
      summary: Invite member to collaboration space
      operationId: inviteCollaborationMember
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [editor, viewer]
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/collaboration/spaces/{spaceId}/members:
    get:
      tags: [Collaboration]
      summary: List active collaboration space members
      operationId: listCollaborationSpaceMembers
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      responses:
        '200':
          description: Member collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollectionResponse'

  /v1/collaboration/spaces/{spaceId}/members/{memberUserId}:
    patch:
      tags: [Collaboration]
      summary: Update collaboration member role
      operationId: updateCollaborationMemberRole
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/MemberUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [editor, viewer]
      responses:
        '200':
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Collaboration]
      summary: Remove collaboration member from space
      operationId: removeCollaborationMember
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/MemberUserId'
      responses:
        '204':
          description: Member removed

  /v1/collaboration/invites/{token}/accept:
    post:
      tags: [Collaboration]
      summary: Accept collaboration invite
      operationId: acceptCollaborationInvite
      parameters:
        - $ref: '#/components/parameters/Token'
      responses:
        '200':
          description: Invite accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/collaboration/spaces/{spaceId}/share/lists/{listId}:
    post:
      tags: [Collaboration]
      summary: Share list to collaboration space
      operationId: shareListToCollaborationSpace
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: List shared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/collaboration/spaces/{spaceId}/share/goals/{goalId}:
    post:
      tags: [Collaboration]
      summary: Share goal to collaboration space
      operationId: shareGoalToCollaborationSpace
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/GoalId'
      responses:
        '200':
          description: Goal shared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/integrations/list-task-sync:
    post:
      tags: [Integrations]
      summary: Enqueue list/task provider sync
      operationId: syncListsAndTasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationSyncRequest'
      responses:
        '202':
          description: Sync queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationSyncResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/integrations/calendar-sync:
    post:
      tags: [Integrations]
      summary: Enqueue calendar provider sync
      operationId: syncCalendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationSyncRequest'
      responses:
        '202':
          description: Sync queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationSyncResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/integrations/journal-sync:
    post:
      tags: [Integrations]
      summary: Enqueue journal provider sync
      operationId: syncJournal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationSyncRequest'
      responses:
        '202':
          description: Sync queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationSyncResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/integrations/marketplace/providers:
    get:
      tags: [Integrations]
      summary: List integration marketplace providers
      operationId: listIntegrationMarketplaceProviders
      responses:
        '200':
          description: Provider catalog collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationMarketplaceProviderCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/integrations/marketplace/providers/{provider}/install:
    post:
      tags: [Integrations]
      summary: Install provider from marketplace catalog
      operationId: installIntegrationMarketplaceProvider
      parameters:
        - $ref: '#/components/parameters/Provider'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                install_metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Provider installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationMarketplaceProviderResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/integrations/marketplace/providers/{provider}/uninstall:
    post:
      tags: [Integrations]
      summary: Uninstall provider from marketplace catalog
      operationId: uninstallIntegrationMarketplaceProvider
      parameters:
        - $ref: '#/components/parameters/Provider'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Provider uninstalled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationMarketplaceProviderResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/integrations/marketplace/audits:
    get:
      tags: [Integrations]
      summary: List integration marketplace install and uninstall audits
      operationId: listIntegrationMarketplaceAudits
      responses:
        '200':
          description: Marketplace audit collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationMarketplaceAuditCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/integrations/connections:
    get:
      tags: [Integrations]
      summary: List integration connections
      operationId: listIntegrationConnections
      responses:
        '200':
          description: Connection collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollectionResponse'

  /v1/integrations/connections/{provider}:
    put:
      tags: [Integrations]
      summary: Connect or reconnect provider
      operationId: upsertIntegrationConnection
      parameters:
        - $ref: '#/components/parameters/Provider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Connection upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'
    delete:
      tags: [Integrations]
      summary: Revoke provider connection
      operationId: revokeIntegrationConnection
      parameters:
        - $ref: '#/components/parameters/Provider'
      responses:
        '204':
          description: Connection revoked

  /v1/integrations/conflicts:
    get:
      tags: [Integrations]
      summary: List open integration conflicts
      operationId: listIntegrationConflicts
      responses:
        '200':
          description: Conflict collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollectionResponse'

  /v1/integrations/conflicts/{conflictId}/resolve:
    post:
      tags: [Integrations]
      summary: Resolve integration conflict
      operationId: resolveIntegrationConflict
      parameters:
        - $ref: '#/components/parameters/ConflictId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [accept, override]
                resolution_payload:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Conflict resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/integrations/failures:
    get:
      tags: [Integrations]
      summary: List integration sync failures
      operationId: listIntegrationFailures
      responses:
        '200':
          description: Failure collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollectionResponse'

  /v1/integrations/failures/{failureId}/replay:
    post:
      tags: [Integrations]
      summary: Replay failed integration sync job
      operationId: replayIntegrationFailure
      parameters:
        - $ref: '#/components/parameters/FailureId'
      responses:
        '202':
          description: Replay queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /v1/notifications/mobile/devices:
    get:
      tags: [Notifications]
      summary: List mobile push devices
      operationId: listMobilePushDevices
      responses:
        '200':
          description: Device collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollectionResponse'
    post:
      tags: [Notifications]
      summary: Register mobile push device
      operationId: createMobilePushDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponse'

  /v1/notifications/mobile/devices/{deviceId}:
    delete:
      tags: [Notifications]
      summary: Revoke mobile push device
      operationId: deleteMobilePushDevice
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '204':
          description: Device revoked

  /v1/notifications/in-app:
    get:
      tags: [Notifications]
      summary: List in-app notifications
      operationId: listInAppNotifications
      parameters:
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: unread_only
          in: query
          required: false
          schema:
            type: boolean
        - name: include_snoozed
          in: query
          required: false
          schema:
            type: boolean
        - name: module
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: In-app notification collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InAppNotificationCollectionResponse'

  /v1/notifications/in-app/{notificationId}/read:
    post:
      tags: [Notifications]
      summary: Mark in-app notification as read
      operationId: markInAppNotificationRead
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InAppNotificationResponse'

  /v1/notifications/in-app/{notificationId}/unread:
    post:
      tags: [Notifications]
      summary: Mark in-app notification as unread
      operationId: markInAppNotificationUnread
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      responses:
        '200':
          description: Notification marked as unread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InAppNotificationResponse'

  /v1/notifications/in-app/{notificationId}/snooze:
    post:
      tags: [Notifications]
      summary: Snooze in-app notification
      operationId: snoozeInAppNotification
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [snoozed_until]
              properties:
                snoozed_until:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Notification snoozed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InAppNotificationResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/notifications/preferences:
    get:
      tags: [Notifications]
      summary: Get notification channel preferences
      operationId: getNotificationPreferences
      responses:
        '200':
          description: Notification preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesResponse'
    patch:
      tags: [Notifications]
      summary: Update notification channel preferences
      operationId: updateNotificationPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferencesUpdateRequest'
      responses:
        '200':
          description: Updated notification preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/notifications/deliveries:
    get:
      tags: [Notifications]
      summary: List notification channel delivery telemetry
      operationId: listNotificationChannelDeliveries
      parameters:
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: channel
          in: query
          required: false
          schema:
            type: string
            enum: [push, email, in_app]
        - name: event_type
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [sent, suppressed, failed]
      responses:
        '200':
          description: Notification channel telemetry collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationChannelDeliveryCollectionResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SanctumToken

  parameters:
    Provider:
      name: provider
      in: path
      required: true
      schema:
        type: string
    ProviderSlug:
      name: providerSlug
      in: path
      required: true
      schema:
        type: string
    OrganizationSlug:
      name: organizationSlug
      in: path
      required: true
      schema:
        type: string
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberUserId:
      name: memberUserId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderId:
      name: providerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SpaceId:
      name: spaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Token:
      name: token
      in: path
      required: true
      schema:
        type: string
    ListId:
      name: listId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GoalId:
      name: goalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConflictId:
      name: conflictId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FailureId:
      name: failureId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProposalId:
      name: proposalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BriefingId:
      name: briefingId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password, tenant_slug]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        tenant_slug:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    IntegrationSyncRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
        idempotency_key:
          type: string

    AuthTokenResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [token, user]
          properties:
            token:
              type: string
            user:
              type: object
              additionalProperties: true

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    EntityResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: true

    EntityCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        meta:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer

    IntegrationSyncResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [mode, enqueued, skipped, sync_request_id, job_references]
          properties:
            mode:
              type: string
              enum: [async]
            processed:
              type: integer
            enqueued:
              type: integer
            skipped:
              type: integer
            sync_request_id:
              type: string
              format: uuid
            job_references:
              type: array
              items:
                type: string

    IntegrationMarketplaceProviderResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/IntegrationMarketplaceProviderItem'

    IntegrationMarketplaceProviderCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationMarketplaceProviderItem'
        meta:
          type: object
          required: [total, installed]
          properties:
            total:
              type: integer
            installed:
              type: integer

    IntegrationMarketplaceAuditCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationMarketplaceAuditItem'
        meta:
          type: object
          required: [total]
          properties:
            total:
              type: integer

    IntegrationMarketplaceProviderItem:
      type: object
      required:
        [
          provider,
          display_name,
          category,
          description,
          auth_type,
          default_scopes,
          supports_webhook,
          sync_modes,
          install_status,
          is_installed,
          connection,
        ]
      properties:
        provider:
          type: string
        display_name:
          type: string
        category:
          type: string
        description:
          type: string
        auth_type:
          type: string
        default_scopes:
          type: array
          items:
            type: string
        supports_webhook:
          type: boolean
        sync_modes:
          type: array
          items:
            type: string
        install_status:
          type: string
          enum: [not_installed, installed, uninstalled]
        is_installed:
          type: boolean
        installed_at:
          type: [string, 'null']
          format: date-time
        uninstalled_at:
          type: [string, 'null']
          format: date-time
        connection:
          type: object
          required: [status, is_connected, scopes]
          properties:
            status:
              type: string
              enum: [not_connected, connected, revoked]
            is_connected:
              type: boolean
            scopes:
              type: array
              items:
                type: string
            expires_at:
              type: [string, 'null']
              format: date-time
            updated_at:
              type: [string, 'null']
              format: date-time

    IntegrationMarketplaceAuditItem:
      type: object
      required: [id, provider, action, status, audit_payload]
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
        action:
          type: string
          enum: [install, uninstall]
        status:
          type: string
        reason:
          type: [string, 'null']
        audit_payload:
          type: object
          additionalProperties: true
        occurred_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: [string, 'null']
          format: date-time

    InAppNotificationResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/InAppNotificationItem'

    InAppNotificationCollectionResponse:
      type: object
      required: [data, meta, groups]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InAppNotificationItem'
        meta:
          type: object
          required: [total, unread]
          properties:
            total:
              type: integer
            unread:
              type: integer
        groups:
          type: array
          items:
            type: object
            required: [group, total, unread]
            properties:
              group:
                type: string
              total:
                type: integer
              unread:
                type: integer

    InAppNotificationItem:
      type: object
      required:
        [
          id,
          event_type,
          title,
          body,
          is_read,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
        title:
          type: string
        body:
          type: string
        module:
          type: [string, 'null']
        entity_type:
          type: [string, 'null']
        entity_id:
          type: [string, 'null']
          format: uuid
        deep_link:
          type: [string, 'null']
        payload:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        is_read:
          type: boolean
        read_at:
          type: [string, 'null']
          format: date-time
        snoozed_until:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NotificationChannelMap:
      type: object
      required: [push, email, in_app]
      properties:
        push:
          type: boolean
        email:
          type: boolean
        in_app:
          type: boolean

    NotificationQuietHours:
      type: object
      required: [enabled, start, end, timezone]
      properties:
        enabled:
          type: boolean
        start:
          type: string
          pattern: '^\\d{2}:\\d{2}$'
        end:
          type: string
          pattern: '^\\d{2}:\\d{2}$'
        timezone:
          type: string

    NotificationPreferencesItem:
      type: object
      required: [channels, event_channels, quiet_hours, locale, supported_event_types]
      properties:
        channels:
          $ref: '#/components/schemas/NotificationChannelMap'
        event_channels:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/NotificationChannelMap'
        quiet_hours:
          $ref: '#/components/schemas/NotificationQuietHours'
        locale:
          type: string
        supported_event_types:
          type: array
          items:
            type: string

    NotificationPreferencesResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/NotificationPreferencesItem'

    NotificationPreferencesUpdateRequest:
      type: object
      properties:
        channels:
          $ref: '#/components/schemas/NotificationChannelMap'
        event_channels:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/NotificationChannelMap'
        quiet_hours:
          $ref: '#/components/schemas/NotificationQuietHours'
        locale:
          type: string
          maxLength: 16

    NotificationChannelDeliveryItem:
      type: object
      required: [id, channel, event_type, status, title, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [push, email, in_app]
        event_type:
          type: string
        status:
          type: string
          enum: [sent, suppressed, failed]
        failure_reason:
          type: [string, 'null']
        title:
          type: string
        payload:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        metadata:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        delivered_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NotificationChannelDeliveryCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NotificationChannelDeliveryItem'
        meta:
          type: object
          required: [total, per_page]
          properties:
            total:
              type: integer
            per_page:
              type: integer

    AiContextGraphResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [schema_version, snapshot, privacy, signals, entities]
          properties:
            schema_version:
              type: string
              example: ai-context.v1
            snapshot:
              type: object
              required: [as_of, window_days, window_start, window_end, fingerprint]
              properties:
                as_of:
                  type: string
                  format: date-time
                window_days:
                  type: integer
                window_start:
                  type: string
                  format: date-time
                window_end:
                  type: string
                  format: date-time
                fingerprint:
                  type: string
                  description: Deterministic hash of the context payload.
            privacy:
              type: object
              required: [redaction_policy_version, mode, redacted_fields]
              properties:
                redaction_policy_version:
                  type: string
                mode:
                  type: string
                  enum: [strict]
                redacted_fields:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: string
            signals:
              type: object
              additionalProperties:
                type: object
                additionalProperties: true
            entities:
              type: object
              required: [tasks, calendar_events, habits, goals, journal_entries]
              properties:
                tasks:
                  type: array
                  items:
                    $ref: '#/components/schemas/AiContextTaskEntity'
                calendar_events:
                  type: array
                  items:
                    $ref: '#/components/schemas/AiContextCalendarEventEntity'
                habits:
                  type: array
                  items:
                    $ref: '#/components/schemas/AiContextHabitEntity'
                goals:
                  type: array
                  items:
                    $ref: '#/components/schemas/AiContextGoalEntity'
                journal_entries:
                  type: array
                  items:
                    $ref: '#/components/schemas/AiContextJournalEntryEntity'

    AiContextTaskEntity:
      type: object
      required: [id, title, status, priority, has_description]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
        priority:
          type: string
        due_date:
          type: [string, 'null']
          format: date
        starts_at:
          type: [string, 'null']
          format: date-time
        assignee_user_id:
          type: [string, 'null']
          format: uuid
        reminder_owner_user_id:
          type: [string, 'null']
          format: uuid
        has_description:
          type: boolean

    AiContextCalendarEventEntity:
      type: object
      required: [id, title, timezone, all_day, has_description]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        start_at:
          type: [string, 'null']
          format: date-time
        end_at:
          type: [string, 'null']
          format: date-time
        timezone:
          type: string
        all_day:
          type: boolean
        linked_entity_type:
          type: [string, 'null']
        linked_entity_id:
          type: [string, 'null']
          format: uuid
        assignee_user_id:
          type: [string, 'null']
          format: uuid
        reminder_owner_user_id:
          type: [string, 'null']
          format: uuid
        has_description:
          type: boolean

    AiContextHabitEntity:
      type: object
      required: [id, title, type, is_active, cadence_type, window_log_count, has_description]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        type:
          type: string
        is_active:
          type: boolean
        cadence_type:
          type: string
        window_log_count:
          type: integer
        last_logged_at:
          type: [string, 'null']
          format: date-time
        has_description:
          type: boolean

    AiContextGoalEntity:
      type: object
      required: [id, title, status, has_description]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
        target_date:
          type: [string, 'null']
          format: date
        has_description:
          type: boolean

    AiContextJournalEntryEntity:
      type: object
      required: [id, title, life_area_ids, has_body]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        mood:
          type: [string, 'null']
        entry_date:
          type: [string, 'null']
          format: date
        life_area_ids:
          type: array
          items:
            type: string
            format: uuid
        has_body:
          type: boolean

    AiCopilotConversationRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 2
          maxLength: 1500
        context:
          type: object
          additionalProperties: false
          properties:
            window_days:
              type: integer
              minimum: 1
              maximum: 60
            entity_limit:
              type: integer
              minimum: 1
              maximum: 50
            as_of:
              type: string
              format: date-time

    AiCopilotSourceReference:
      type: object
      required: [module, entity_type]
      properties:
        module:
          type: string
        entity_type:
          type: string
        entity_id:
          type: [string, 'null']
          format: uuid
        title:
          type: [string, 'null']

    AiCopilotConversationResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required:
            - conversation_id
            - intent
            - message
            - answer
            - provider
            - context_snapshot
            - explainability
            - source_references
            - generated_at
          properties:
            conversation_id:
              type: string
              format: uuid
            intent:
              type: string
            message:
              type: string
            answer:
              type: string
            provider:
              type: object
              required: [mode, reason]
              properties:
                mode:
                  type: string
                  enum: [primary, fallback]
                reason:
                  type: string
            context_snapshot:
              type: object
              required: [schema_version, as_of, fingerprint]
              properties:
                schema_version:
                  type: string
                as_of:
                  type: string
                  format: date-time
                fingerprint:
                  type: string
            explainability:
              type: object
              required: [strategy, reason_codes, source_references]
              properties:
                strategy:
                  type: string
                reason_codes:
                  type: array
                  items:
                    type: string
                source_references:
                  type: array
                  items:
                    $ref: '#/components/schemas/AiCopilotSourceReference'
            source_references:
              type: array
              items:
                $ref: '#/components/schemas/AiCopilotSourceReference'
            generated_at:
              type: string
              format: date-time

    AiActionProposalRequest:
      type: object
      required: [action_type, proposal_payload]
      properties:
        action_type:
          type: string
          enum: [create_task, update_task_status]
        proposal_payload:
          type: object
          additionalProperties: true
        note:
          type: string
          maxLength: 1000

    AiActionProposalItem:
      type: object
      required: [id, action_type, proposal_payload, requires_approval, status]
      properties:
        id:
          type: string
          format: uuid
        action_type:
          type: string
          enum: [create_task, update_task_status]
        proposal_payload:
          type: object
          additionalProperties: true
        requires_approval:
          type: boolean
        status:
          type: string
          enum: [pending, approved, rejected, executed, failed]
        note:
          type: [string, 'null']
        rejection_reason:
          type: [string, 'null']
        execution_result:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        failure_reason:
          type: [string, 'null']
        approved_by_user_id:
          type: [string, 'null']
          format: uuid
        approved_at:
          type: [string, 'null']
          format: date-time
        rejected_at:
          type: [string, 'null']
          format: date-time
        executed_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: [string, 'null']
          format: date-time

    AiActionProposalResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AiActionProposalItem'

    AiActionProposalCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AiActionProposalItem'
        meta:
          type: object
          required: [total, per_page]
          properties:
            total:
              type: integer
            per_page:
              type: integer

