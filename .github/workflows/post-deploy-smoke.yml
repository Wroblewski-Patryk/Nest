name: Post-Deploy Smoke Suite

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: Run smoke checks in dry-run mode
        required: true
        default: true
        type: boolean

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke suite
        shell: pwsh
        run: |
          if ("${{ inputs.dry_run }}" -eq "true") {
            ./scripts/release/post-deploy-smoke.ps1 -Environment "${{ inputs.environment }}" -DryRun
          } else {
            ./scripts/release/post-deploy-smoke.ps1 -Environment "${{ inputs.environment }}"
          }
